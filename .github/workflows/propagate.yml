name: Propagate Release

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Source repo (e.g. punt-labs/punt-kit)"
        required: true
        type: string
      tag:
        description: "Git tag (e.g. v0.3.0) — used to resolve SHA if sha is empty"
        required: false
        type: string
        default: ""
      sha:
        description: "Commit SHA (7+ chars) — takes precedence over tag"
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  propagate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    env:
      INPUT_REPO: ${{ inputs.repo }}
      INPUT_TAG: ${{ inputs.tag }}
      INPUT_SHA: ${{ inputs.sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          # Use PROPAGATE_TOKEN so git push authenticates with the PAT.
          # Pushes from GITHUB_TOKEN suppress workflow triggers, preventing
          # CI from running on the PR.
          token: ${{ secrets.PROPAGATE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update install-all.sh SHA in profile README
        run: |
          README="profile/README.md"
          if [ ! -f "$README" ]; then
            echo "No profile/README.md found"
            exit 1
          fi

          # Only punt-kit changes affect the install-all.sh URL
          if [ "$INPUT_REPO" != "punt-labs/punt-kit" ]; then
            echo "Not a punt-kit change — nothing to update"
            exit 0
          fi

          # Resolve SHA: prefer direct sha input, fall back to tag resolution
          if [ -n "$INPUT_SHA" ]; then
            SHORT_SHA="${INPUT_SHA:0:7}"
            LABEL="$INPUT_SHA"
          elif [ -n "$INPUT_TAG" ]; then
            # Get the commit SHA for the tag (handle annotated tags)
            TAG_INFO=$(gh api "repos/$INPUT_REPO/git/ref/tags/$INPUT_TAG" --jq '.object.sha + " " + .object.type' 2>/dev/null || echo "")
            if [ -z "$TAG_INFO" ]; then
              echo "Could not resolve tag info for $INPUT_TAG in $INPUT_REPO — skipping"
              exit 0
            fi
            TAG_SHA=$(echo "$TAG_INFO" | cut -d' ' -f1)
            TAG_TYPE=$(echo "$TAG_INFO" | cut -d' ' -f2)

            if [ "$TAG_TYPE" = "tag" ]; then
              TAG_SHA=$(gh api "repos/$INPUT_REPO/git/tags/$TAG_SHA" --jq '.object.sha' 2>/dev/null || echo "")
              if [ -z "$TAG_SHA" ]; then
                echo "Could not dereference annotated tag $INPUT_TAG — skipping"
                exit 0
              fi
            fi
            SHORT_SHA="${TAG_SHA:0:7}"
            LABEL="$INPUT_TAG"
          else
            echo "Neither sha nor tag provided — nothing to do"
            exit 0
          fi

          # Replace the SHA in the install-all.sh curl URL
          # Pattern: punt-labs/punt-kit/<SHA>/install-all.sh
          sed -i "s|punt-labs/punt-kit/[a-f0-9]\{7,40\}/install-all.sh|punt-labs/punt-kit/${SHORT_SHA}/install-all.sh|g" "$README"

          if git diff --quiet "$README"; then
            echo "No README changes needed"
          else
            git add "$README"
            git commit -m "chore: update install-all.sh SHA to ${LABEL}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create PR
        run: |
          if git diff --quiet HEAD origin/main; then
            echo "Nothing to push"
            exit 0
          fi

          # Branch name: use tag if available, otherwise sha
          if [ -n "$INPUT_TAG" ]; then
            BRANCH="propagate/punt-kit-${INPUT_TAG}"
          else
            BRANCH="propagate/punt-kit-${INPUT_SHA:0:7}"
          fi
          git checkout -b "$BRANCH"

          # Delete stale remote branch from a previous failed run (if any)
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "chore: update install-all.sh SHA to ${INPUT_TAG:-${INPUT_SHA:0:7}}" \
            --body "Automated propagation from ${INPUT_REPO} ${INPUT_TAG:-commit ${INPUT_SHA:0:7}}." \
            --head "$BRANCH" \
            --base main)
          echo "Created PR: $PR_URL"

          gh pr merge "$PR_URL" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.PROPAGATE_TOKEN }}
